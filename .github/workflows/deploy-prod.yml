name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Backend image tag to deploy"
        required: true
        type: string
      source_commit_sha:
        description: "Commit SHA that must have a successful CI run"
        required: true
        type: string
      promote_from_tag:
        description: "Optional source tag to retag as image_tag before deploy"
        required: false
        type: string

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_LOCK_TIMEOUT: ${{ vars.TF_LOCK_TIMEOUT || '10m' }}
  TF_DIR: vizier-inference-infra/terraform/envs/prod
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_rds_password: ${{ secrets.TF_VAR_RDS_PASSWORD }}
  TF_VAR_django_secret_key: ${{ secrets.TF_VAR_DJANGO_SECRET_KEY }}
  TF_VAR_inference_api_bearer_token: ${{ secrets.TF_VAR_INFERENCE_API_BEARER_TOKEN }}
  TF_VAR_google_api_key: ${{ secrets.TF_VAR_GOOGLE_API_KEY }}
  TF_VAR_email_host_user: ${{ secrets.TF_VAR_EMAIL_HOST_USER }}
  TF_VAR_email_host_password: ${{ secrets.TF_VAR_EMAIL_HOST_PASSWORD }}
  TF_VAR_stripe_secret_key: ${{ secrets.TF_VAR_STRIPE_SECRET_KEY }}
  TF_VAR_stripe_webhook_secret: ${{ secrets.TF_VAR_STRIPE_WEBHOOK_SECRET }}
  TF_VAR_biomedparse_image_override: ${{ vars.BIOMEDPARSE_IMAGE_OVERRIDE || '996561439065.dkr.ecr.us-east-1.amazonaws.com/biomedparse@sha256:4651856870d28c6770d3c7fc8114db2f50501e3ca58e336a711d053a446ba35d' }}
  TF_VAR_manage_backend_ecr_repository: ${{ vars.MANAGE_BACKEND_ECR_REPOSITORY || 'false' }}
  TF_VAR_external_backend_ecr_repository_url: ${{ vars.BACKEND_ECR_REPOSITORY_URL || '' }}
  TF_VAR_manage_biomedparse_ecr_repository: ${{ vars.MANAGE_BIOMEDPARSE_ECR_REPOSITORY || 'false' }}
  TF_VAR_external_biomedparse_ecr_repository_url: ${{ vars.BIOMEDPARSE_ECR_REPOSITORY_URL || '' }}
  TF_VAR_enable_nat_gateway: ${{ vars.TF_VAR_ENABLE_NAT_GATEWAY || 'true' }}
  TF_VAR_enable_vpc_endpoints: ${{ vars.TF_VAR_ENABLE_VPC_ENDPOINTS || 'false' }}
  TF_VAR_email_backend: ${{ vars.TF_VAR_EMAIL_BACKEND || '' }}
  TF_VAR_email_host: ${{ vars.TF_VAR_EMAIL_HOST || '' }}
  TF_VAR_email_port: ${{ vars.TF_VAR_EMAIL_PORT || '587' }}
  TF_VAR_email_use_tls: ${{ vars.TF_VAR_EMAIL_USE_TLS || 'true' }}
  TF_VAR_email_use_ssl: ${{ vars.TF_VAR_EMAIL_USE_SSL || 'false' }}
  TF_VAR_email_timeout: ${{ vars.TF_VAR_EMAIL_TIMEOUT || '10' }}
  TF_VAR_default_from_email: ${{ vars.TF_VAR_DEFAULT_FROM_EMAIL || '' }}
  TF_VAR_invitation_platform_name: ${{ vars.TF_VAR_INVITATION_PLATFORM_NAME || 'Vizier Med' }}
  TF_VAR_invitation_login_url: ${{ vars.TF_VAR_INVITATION_LOGIN_URL || 'https://viziermed.com/' }}
  TF_VAR_enable_stripe_billing: ${{ vars.TF_VAR_ENABLE_STRIPE_BILLING || 'false' }}
  TF_VAR_stripe_product_id: ${{ vars.TF_VAR_STRIPE_PRODUCT_ID || '' }}
  TF_VAR_stripe_price_id_individual_monthly: ${{ vars.TF_VAR_STRIPE_PRICE_ID_INDIVIDUAL_MONTHLY || '' }}
  TF_VAR_stripe_price_id_individual_annual: ${{ vars.TF_VAR_STRIPE_PRICE_ID_INDIVIDUAL_ANNUAL || '' }}
  TF_VAR_stripe_price_id_clinic_monthly: ${{ vars.TF_VAR_STRIPE_PRICE_ID_CLINIC_MONTHLY || '' }}
  TF_VAR_stripe_price_id_clinic_yearly: ${{ vars.TF_VAR_STRIPE_PRICE_ID_CLINIC_YEARLY || '' }}
  TF_VAR_stripe_price_lookup_key_individual_monthly: ${{ vars.TF_VAR_STRIPE_PRICE_LOOKUP_KEY_INDIVIDUAL_MONTHLY || '' }}
  TF_VAR_stripe_price_lookup_key_individual_annual: ${{ vars.TF_VAR_STRIPE_PRICE_LOOKUP_KEY_INDIVIDUAL_ANNUAL || '' }}
  TF_VAR_stripe_allowed_redirect_origins: ${{ vars.TF_VAR_STRIPE_ALLOWED_REDIRECT_ORIGINS || '[]' }}
  TF_VAR_django_allowed_hosts: ${{ vars.TF_VAR_DJANGO_ALLOWED_HOSTS || '*' }}
  TF_VAR_api_custom_domain_name: ${{ vars.TF_VAR_API_CUSTOM_DOMAIN_NAME || '' }}
  TF_VAR_api_route53_zone_id: ${{ vars.TF_VAR_API_ROUTE53_ZONE_ID || '' }}
  TF_VAR_api_cloudfront_certificate_arn: ${{ vars.TF_VAR_API_CLOUDFRONT_CERTIFICATE_ARN || '' }}
  TF_VAR_cognito_callback_urls: ${{ vars.TF_VAR_COGNITO_CALLBACK_URLS || '["https://oauth.pstmn.io/v1/callback","http://localhost:3000/auth/callback","http://localhost:8000/auth/callback","https://viziermed.com/auth/callback"]' }}
  TF_VAR_cognito_logout_urls: ${{ vars.TF_VAR_COGNITO_LOGOUT_URLS || '["http://localhost:3000/","http://localhost:8000/","https://viziermed.com/"]' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
  BACKEND_ECR_REPOSITORY_URL: ${{ vars.BACKEND_ECR_REPOSITORY_URL || '' }}
  AMPLIFY_SYNC_ENABLED: ${{ vars.AMPLIFY_SYNC_ENABLED || 'false' }}
  AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID || '' }}
  AMPLIFY_BRANCH: ${{ vars.AMPLIFY_BRANCH || 'main' }}
  AMPLIFY_FRONTEND_BASE_URL: ${{ vars.AMPLIFY_FRONTEND_BASE_URL || '' }}
  AMPLIFY_API_SCHEME: ${{ vars.AMPLIFY_API_SCHEME || 'http' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Verify CI success for source commit
        uses: actions/github-script@v7
        with:
          script: |
            const sha = `${{ inputs.source_commit_sha }}`.trim();
            if (!/^[0-9a-f]{40}$/i.test(sha)) {
              core.setFailed(`source_commit_sha is not a full 40-char SHA: ${sha}`);
              return;
            }

            const { owner, repo } = context.repo;
            const resp = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'ci.yml',
              head_sha: sha,
              status: 'completed',
              per_page: 50,
            });

            const successRun = (resp.data.workflow_runs || []).find(
              (run) => run.conclusion === 'success'
            );

            if (!successRun) {
              core.setFailed(`No successful CI run found for commit ${sha}`);
              return;
            }

            core.info(`CI gate passed: run #${successRun.run_number} for ${sha}`);

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Validate pinned BiomedParse image reference
        run: |
          set -euo pipefail
          if [[ "${TF_VAR_biomedparse_image_override}" == *":latest" ]]; then
            echo "Refusing deploy: BIOMEDPARSE image cannot use :latest."
            echo "Set BIOMEDPARSE_IMAGE_OVERRIDE to a pinned tag/digest in GitHub Environment."
            exit 1
          fi
          echo "BiomedParse image ref: ${TF_VAR_biomedparse_image_override}"

      - name: Terraform init (prod)
        working-directory: ${{ env.TF_DIR }}
        run: |
          if [[ -z "${TF_STATE_BUCKET}" ]]; then
            echo "TF_STATE_BUCKET GitHub variable is required."
            exit 1
          fi
          BACKEND_ARGS=(
            "-backend-config=bucket=${TF_STATE_BUCKET}"
            "-backend-config=key=envs/prod/terraform.tfstate"
            "-backend-config=region=${AWS_REGION}"
            "-backend-config=encrypt=true"
          )
          if [[ -n "${TF_STATE_LOCK_TABLE}" ]]; then
            BACKEND_ARGS+=("-backend-config=dynamodb_table=${TF_STATE_LOCK_TABLE}")
          fi
          terraform init -input=false -reconfigure "${BACKEND_ARGS[@]}"

      - name: Cleanup legacy ECR resources from Terraform state
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          remove_addr() {
            local addr="$1"
            terraform state rm "$addr" >/dev/null 2>&1 || true
          }

          if [[ "${TF_VAR_manage_backend_ecr_repository}" != "true" ]]; then
            remove_addr "module.ecr_backend.aws_ecr_repository.this"
            remove_addr "module.ecr_backend.aws_ecr_lifecycle_policy.this"
            remove_addr "module.ecr_backend[0].aws_ecr_repository.this"
            remove_addr "module.ecr_backend[0].aws_ecr_lifecycle_policy.this"
          fi

          if [[ "${TF_VAR_manage_biomedparse_ecr_repository}" != "true" ]]; then
            remove_addr "module.ecr_biomedparse.aws_ecr_repository.this"
            remove_addr "module.ecr_biomedparse.aws_ecr_lifecycle_policy.this"
            remove_addr "module.ecr_biomedparse[0].aws_ecr_repository.this"
            remove_addr "module.ecr_biomedparse[0].aws_ecr_lifecycle_policy.this"
          fi

      - name: Ensure GitHub Terraform role permissions are up-to-date
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          terraform apply \
            -input=false \
            -lock-timeout="${TF_LOCK_TIMEOUT}" \
            -auto-approve \
            -target=module.iam_github \
            -var="backend_image_tag=bootstrap" \
            -var="biomedparse_image_tag=bootstrap"

      - name: Restore/import app secret if it already exists
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          SECRET_NAME="vizier/prod/django-app"
          SECRET_JSON="$(mktemp)"
          CANONICAL_ADDR="module.app_secrets.aws_secretsmanager_secret.this"
          LEGACY_ADDR_1="module.app_secrets.aws_secretsmanager_secret.this[0]"
          LEGACY_ADDR_2="module.app_secrets[0].aws_secretsmanager_secret.this"

          if terraform state show "${LEGACY_ADDR_1}" >/dev/null 2>&1; then
            terraform state mv "${LEGACY_ADDR_1}" "${CANONICAL_ADDR}" || true
          fi
          if terraform state show "${LEGACY_ADDR_2}" >/dev/null 2>&1; then
            terraform state mv "${LEGACY_ADDR_2}" "${CANONICAL_ADDR}" || true
          fi

          if aws secretsmanager describe-secret --region "${AWS_REGION}" --secret-id "${SECRET_NAME}" > "${SECRET_JSON}" 2>/dev/null; then
            DELETED_DATE="$(jq -r '.DeletedDate // empty' "${SECRET_JSON}")"
            if [[ -n "${DELETED_DATE}" ]]; then
              aws secretsmanager restore-secret --region "${AWS_REGION}" --secret-id "${SECRET_NAME}"
            fi

            if ! terraform state show "${CANONICAL_ADDR}" >/dev/null 2>&1; then
              terraform import -input=false "${CANONICAL_ADDR}" "${SECRET_NAME}"
            fi
          fi

      - name: Ensure ECR repositories exist
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          TARGET_ARGS=()
          if [[ "${TF_VAR_manage_backend_ecr_repository}" == "true" ]]; then
            TARGET_ARGS+=("-target=module.ecr_backend[0]")
          fi
          if [[ "${TF_VAR_manage_biomedparse_ecr_repository}" == "true" ]]; then
            TARGET_ARGS+=("-target=module.ecr_biomedparse[0]")
          fi

          if [[ ${#TARGET_ARGS[@]} -eq 0 ]]; then
            echo "Skipping ECR creation: using external repositories."
            exit 0
          fi

          terraform apply \
            -input=false \
            -lock-timeout="${TF_LOCK_TIMEOUT}" \
            -auto-approve \
            "${TARGET_ARGS[@]}" \
            -var="backend_image_tag=bootstrap" \
            -var="biomedparse_image_tag=bootstrap"

      - name: Resolve ECR backend repository
        working-directory: ${{ env.TF_DIR }}
        run: |
          REPO_URL="${BACKEND_ECR_REPOSITORY_URL}"
          if [[ -z "${REPO_URL}" ]]; then
            REPO_URL="$(terraform output -raw backend_ecr_repository_url)"
          fi
          if [[ -z "${REPO_URL}" ]]; then
            echo "Could not resolve BACKEND_ECR_REPOSITORY_URL."
            exit 1
          fi
          echo "BACKEND_ECR_REPOSITORY_URL=${REPO_URL}" >> "$GITHUB_ENV"

      - name: Resolve Cognito callback/logout URLs
        run: |
          set -euo pipefail
          CALLBACKS='["https://oauth.pstmn.io/v1/callback","http://localhost:3000/auth/callback","http://localhost:8000/auth/callback","https://viziermed.com/auth/callback"]'
          LOGOUTS='["http://localhost:3000/","http://localhost:8000/","https://viziermed.com/"]'

          if [[ -n "${AMPLIFY_FRONTEND_BASE_URL}" ]]; then
            BASE="${AMPLIFY_FRONTEND_BASE_URL%/}"
            CALLBACKS="$(jq -cn --arg base "${BASE}" '["https://oauth.pstmn.io/v1/callback","http://localhost:3000/auth/callback","http://localhost:8000/auth/callback",($base + "/auth/callback")]')"
            LOGOUTS="$(jq -cn --arg base "${BASE}" '["http://localhost:3000/","http://localhost:8000/",($base + "/")]')"
          fi

          if [[ -n "${TF_VAR_cognito_callback_urls}" ]]; then
            CALLBACKS="${TF_VAR_cognito_callback_urls}"
          fi
          if [[ -n "${TF_VAR_cognito_logout_urls}" ]]; then
            LOGOUTS="${TF_VAR_cognito_logout_urls}"
          fi

          echo "TF_VAR_cognito_callback_urls=${CALLBACKS}" >> "$GITHUB_ENV"
          echo "TF_VAR_cognito_logout_urls=${LOGOUTS}" >> "$GITHUB_ENV"

      - name: Promote validated image tag
        if: ${{ inputs.promote_from_tag != '' }}
        env:
          ECR_REPOSITORY_URI: ${{ env.BACKEND_ECR_REPOSITORY_URL }}
          SOURCE_TAG: ${{ inputs.promote_from_tag }}
          TARGET_TAG: ${{ inputs.image_tag }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: ./scripts/deploy/tag_release.sh

      - name: Assert backend image tag exists
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPOSITORY_URI: ${{ env.BACKEND_ECR_REPOSITORY_URL }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          aws ecr describe-images \
            --region "${AWS_REGION}" \
            --repository-name "${ECR_REPOSITORY_URI##*/}" \
            --image-ids "imageTag=${IMAGE_TAG}" \
            --query 'imageDetails[0].imageDigest' \
            --output text >/dev/null

      - name: Terraform apply (prod)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply \
            -input=false \
            -lock-timeout="${TF_LOCK_TIMEOUT}" \
            -auto-approve \
            -var="backend_image_tag=${{ inputs.image_tag }}"

      - name: Sync Amplify environment variables (prod)
        if: ${{ env.AMPLIFY_SYNC_ENABLED == 'true' && env.AMPLIFY_APP_ID != '' }}
        env:
          AMPLIFY_APP_ID: ${{ env.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: ${{ env.AMPLIFY_BRANCH }}
          AMPLIFY_FRONTEND_BASE_URL: ${{ env.AMPLIFY_FRONTEND_BASE_URL }}
          AMPLIFY_API_SCHEME: ${{ env.AMPLIFY_API_SCHEME }}
        run: |
          set -euo pipefail
          ARGS=(--env prod --app-id "${AMPLIFY_APP_ID}" --branch "${AMPLIFY_BRANCH}" --api-scheme "${AMPLIFY_API_SCHEME}")
          if [[ -n "${AMPLIFY_FRONTEND_BASE_URL}" ]]; then
            ARGS+=(--frontend-base-url "${AMPLIFY_FRONTEND_BASE_URL}")
          fi
          ./scripts/deploy/sync_amplify_env.sh "${ARGS[@]}"

      - name: Export runtime outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail

          ECS_CLUSTER="$(terraform output -raw ecs_gpu_cluster_name)"
          TASK_DEFINITION_ARN="$(terraform output -raw ecs_fargate_django_task_definition_arn)"
          CONTAINER_NAME="$(terraform output -raw ecs_fargate_django_service_name)"
          SUBNET_IDS="$(terraform output -json private_subnet_ids | jq -r 'join(",")')"
          SECURITY_GROUP_IDS="$(terraform output -raw fargate_app_security_group_id)"
          ALB_DNS_NAME="$(terraform output -raw alb_dns_name)"

          if [[ -z "${SUBNET_IDS}" || "${SUBNET_IDS}" == "null" ]]; then
            echo "private_subnet_ids terraform output is empty"
            exit 1
          fi

          {
            echo "ECS_CLUSTER=${ECS_CLUSTER}"
            echo "ECS_API_SERVICE_NAME=${CONTAINER_NAME}"
            echo "TASK_DEFINITION_ARN=${TASK_DEFINITION_ARN}"
            echo "MIGRATION_CONTAINER_NAME=${CONTAINER_NAME}"
            echo "BOOTSTRAP_CONTAINER_NAME=${CONTAINER_NAME}"
            echo "SUBNET_IDS=${SUBNET_IDS}"
            echo "SECURITY_GROUP_IDS=${SECURITY_GROUP_IDS}"
            echo "ALB_DNS_NAME=${ALB_DNS_NAME}"
          } >> "$GITHUB_ENV"

      - name: Run database migrations
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          TASK_DEFINITION_ARN: ${{ env.TASK_DEFINITION_ARN }}
          SUBNET_IDS: ${{ env.SUBNET_IDS }}
          SECURITY_GROUP_IDS: ${{ env.SECURITY_GROUP_IDS }}
          MIGRATION_CONTAINER_NAME: ${{ env.MIGRATION_CONTAINER_NAME }}
        run: ./scripts/deploy/run_ecs_migrate.sh

      - name: Bootstrap initial tenant/admin
        if: ${{ vars.BOOTSTRAP_ADMIN_EMAIL != '' }}
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          TASK_DEFINITION_ARN: ${{ env.TASK_DEFINITION_ARN }}
          SUBNET_IDS: ${{ env.SUBNET_IDS }}
          SECURITY_GROUP_IDS: ${{ env.SECURITY_GROUP_IDS }}
          BOOTSTRAP_CONTAINER_NAME: ${{ env.BOOTSTRAP_CONTAINER_NAME }}
          BOOTSTRAP_ADMIN_EMAIL: ${{ vars.BOOTSTRAP_ADMIN_EMAIL }}
          BOOTSTRAP_CREATE_USER_IF_MISSING: "1"
          BOOTSTRAP_MAKE_SUPERUSER: "1"
        run: ./scripts/deploy/run_bootstrap.sh

      - name: Wait for API ECS service stable
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          ECS_API_SERVICE_NAME: ${{ env.ECS_API_SERVICE_NAME }}
        run: |
          set -euo pipefail
          MAX_ATTEMPTS=36
          SLEEP_SECONDS=10

          for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
            SERVICE_JSON="$(aws ecs describe-services \
              --region "${AWS_REGION}" \
              --cluster "${ECS_CLUSTER}" \
              --services "${ECS_API_SERVICE_NAME}" \
              --output json)"

            DESIRED="$(jq -r '.services[0].desiredCount // 0' <<< "${SERVICE_JSON}")"
            RUNNING="$(jq -r '.services[0].runningCount // 0' <<< "${SERVICE_JSON}")"
            PENDING="$(jq -r '.services[0].pendingCount // 0' <<< "${SERVICE_JSON}")"
            EVENT_MSG="$(jq -r '.services[0].events[0].message // ""' <<< "${SERVICE_JSON}")"

            echo "ECS status attempt ${attempt}/${MAX_ATTEMPTS}: desired=${DESIRED} running=${RUNNING} pending=${PENDING}"

            if [[ "${RUNNING}" == "${DESIRED}" && "${PENDING}" == "0" ]]; then
              echo "ECS service is stable."
              exit 0
            fi

            if grep -Eiq "unable to start container process|essential container in task exited|CannotPullContainerError|ResourceInitializationError|CannotCreateContainerError|failed to pull image|unable to pull secrets|exec: \"gunicorn\": executable file not found" <<< "${EVENT_MSG}"; then
              echo "Detected fatal ECS event:"
              echo "${EVENT_MSG}"
              exit 1
            fi

            sleep "${SLEEP_SECONDS}"
          done

          echo "Timed out waiting ECS service to stabilize."
          exit 1

      - name: API smoke test
        env:
          API_BASE_URL: http://${{ env.ALB_DNS_NAME }}
          AUTH_TOKEN: ${{ secrets.SMOKE_AUTH_TOKEN }}
          SMOKE_MAX_ATTEMPTS: "36"
          SMOKE_SLEEP_SECONDS: "10"
        run: ./scripts/deploy/smoke_api.sh

      - name: ECS diagnostics on smoke failure
        if: failure()
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          ECS_API_SERVICE_NAME: ${{ env.ECS_API_SERVICE_NAME }}
          TF_DIR: ${{ env.TF_DIR }}
        run: |
          set +e
          CLUSTER="${ECS_CLUSTER:-}"
          SERVICE="${ECS_API_SERVICE_NAME:-}"

          if [[ -z "${CLUSTER}" || -z "${SERVICE}" ]]; then
            if [[ -n "${TF_DIR:-}" && -d "${TF_DIR}" ]]; then
              CLUSTER="$(terraform -chdir="${TF_DIR}" output -raw ecs_gpu_cluster_name 2>/dev/null || true)"
              SERVICE="$(terraform -chdir="${TF_DIR}" output -raw ecs_fargate_django_service_name 2>/dev/null || true)"
            fi
          fi

          if [[ -z "${CLUSTER}" || -z "${SERVICE}" ]]; then
            echo "Skipping ECS diagnostics: ECS_CLUSTER or ECS_API_SERVICE_NAME is empty."
            exit 0
          fi

          aws ecs describe-services \
            --region "${AWS_REGION}" \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}" \
            --query 'services[0].{status:status,runningCount:runningCount,desiredCount:desiredCount,pendingCount:pendingCount,events:events[0:10]}' \
            --output json
