name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vizier_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: vizier_backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall apps services vizier_backend

      - name: Run inference domain tests
        env:
          DEBUG: "True"
          DJANGO_SECRET_KEY: ci-secret-key
          COGNITO_USER_POOL_ID: ""
          COGNITO_CLIENT_ID: ""
        run: python manage.py test apps.inference.tests --verbosity=2

  terraform:
    name: Terraform (fmt + validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vizier-inference-infra/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init/validate (dev)
        working-directory: vizier-inference-infra/terraform/envs/dev
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Terraform init/validate (prod)
        working-directory: vizier-inference-infra/terraform/envs/prod
        run: |
          terraform init -backend=false -input=false
          terraform validate
